<!DOCTYPE html>
<!-- everlearn demo template. RULES: self-contained, no CDNs, max 80 lines,
     interactive, dark-friendly, built around the user's domain & naming.
     Replace ALL placeholder copy with the user's language and concept. -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; padding: 20px; font: 14px/1.5 system-ui, sans-serif;
    background: #1e1e2e; color: #cdd6f4;
  }
  h2 { margin: 0 0 12px; font-size: 16px; color: #89b4fa; }
  .stage {
    background: #181825; border: 1px solid #313244; border-radius: 8px;
    padding: 16px; min-height: 80px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; transition: all .25s ease;
  }
  .controls { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  button {
    background: #585b70; color: #cdd6f4; border: 0; border-radius: 6px;
    padding: 8px 14px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: #6c7086; }
  .note { margin-top: 10px; font-size: 12px; color: #9399b2; }
</style>
</head>
<body>
  <!-- Replace this whole block with a demo of the ACTUAL concept,
       built around the user's domain (their cart, their queue, their state). -->
  <h2>Concept: &lt;name&gt;</h2>
  <div class="stage" id="stage">initial state</div>
  <div class="controls">
    <button onclick="step()">Next step</button>
    <button onclick="reset()">Reset</button>
  </div>
  <p class="note" id="note">Click to see how the state changes.</p>

<script>
  // Keep state and logic minimal — demonstrate ONE idea by manipulation.
  const stage = document.getElementById('stage');
  const note  = document.getElementById('note');
  let i = 0;
  const steps = [
    { text: 'initial state',      note: 'Starting point.' },
    { text: 'intermediate state', note: 'What changed and why.' },
    { text: 'final state',        note: 'The result of the concept.' },
  ];
  function render() {
    stage.textContent = steps[i].text;
    note.textContent  = steps[i].note;
  }
  function step()  { i = (i + 1) % steps.length; render(); }
  function reset() { i = 0; render(); }
  render();
</script>
</body>
</html>
